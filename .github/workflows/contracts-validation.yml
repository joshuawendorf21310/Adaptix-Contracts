name: contracts-validation

# IMPORTANT: validate (3.11) and validate (3.12) are REQUIRED status checks in the
# main-canonical-protection ruleset. They MUST run on every PR (including dependency
# updates) so the ruleset can be satisfied. Do not reintroduce path filters here.
on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Run contract validation script
        run: python validate_contracts.py

      - name: Run pytest regression suite
        run: python -m pytest --cov=adaptix_contracts --cov-report=term-missing

      - name: Build distribution artifacts
        run: python -m build --sdist --wheel

      - name: Verify distribution metadata
        run: python -m twine check dist/*