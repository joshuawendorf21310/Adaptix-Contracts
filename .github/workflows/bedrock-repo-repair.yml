name: Bedrock Repo Repair

on:
  workflow_dispatch:
    inputs:
      max_iterations:
        description: "Maximum Bedrock repair iterations"
        required: false
        default: "3"
      focus_paths:
        description: "Optional comma-separated files to prioritize"
        required: false
        default: ""

permissions:
  id-token: write
  contents: write
  pull-requests: write
  actions: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  repair:
    name: Repair repo failures with Bedrock
    runs-on: ubuntu-latest

    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      BEDROCK_REPAIR_MODEL_ID: ${{ vars.BEDROCK_REPAIR_MODEL_ID }}
      MAX_ITERATIONS: ${{ inputs.max_iterations }}
      FOCUS_PATHS: ${{ inputs.focus_paths }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Validate required GitHub variables
        run: |
          set -euo pipefail
          test -n "${{ vars.AWS_REGION }}"
          test -n "${{ vars.AWS_BEDROCK_ROLE_ARN }}"
          test -n "${{ vars.BEDROCK_REPAIR_MODEL_ID }}"

      - name: Configure AWS credentials through OIDC
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_BEDROCK_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Bedrock CI dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-bedrock-ci.txt
          pip install ruff pytest || true

      - name: Install Python project dependencies when present
        run: |
          set -euo pipefail
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt || true
          fi
          if [ -f pyproject.toml ]; then
            pip install -e ".[dev]" || pip install -e . || true
          fi

      - name: Install Node dependencies when present
        run: |
          set -euo pipefail
          if [ -f package-lock.json ]; then
            npm ci
          elif [ -f package.json ]; then
            npm install
          fi

      - name: Configure git identity
        run: |
          git config user.name "adaptix-bedrock-repair-agent"
          git config user.email "bedrock-repair@adaptixcore.com"

      - name: Create repair branch
        run: |
          set -euo pipefail
          BRANCH="fix/bedrock-repo-repair-${{ github.run_number }}"
          git checkout -b "$BRANCH"
          echo "REPAIR_BRANCH=$BRANCH" >> "$GITHUB_ENV"

      - name: Bedrock preflight
        run: python tools/bedrock_ops.py preflight

      - name: Bedrock invoke test
        run: python tools/bedrock_ops.py invoke-test

      - name: Security audit before repair
        run: python tools/bedrock_ops.py security-audit

      - name: Run Bedrock repair loop
        run: |
          python tools/bedrock_ops.py repair

      - name: Security audit after repair
        run: python tools/bedrock_ops.py security-audit

      - name: Commit and push repair changes
        id: commit
        run: |
          set -euo pipefail
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git status --short
          git add .
          git commit -m "fix: repair lint and test blockers with Bedrock"
          git push -u origin "$REPAIR_BRANCH"
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Open PR
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr create \
            --title "fix: Bedrock repo repair" \
            --body-file bedrock-repair-report.md \
            --base main \
            --head "$REPAIR_BRANCH"

      - name: Upload repair artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: bedrock-repo-repair-artifacts
          path: |
            bedrock-repair-report.md
            bedrock-repair.patch
            bedrock-validation.log
            bedrock-changed-files.txt
            bedrock-caller-identity.txt
          if-no-files-found: ignore
