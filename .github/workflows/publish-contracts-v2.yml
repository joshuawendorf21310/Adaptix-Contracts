name: publish-contracts-v2

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: dev

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install with dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Run tests
        run: pytest

      - name: Optional deploy
        if: ${{ secrets.DEPLOY_WEBHOOK_URL != '' }}
        env:
          DEPLOY_WEBHOOK_URL: ${{ secrets.DEPLOY_WEBHOOK_URL }}
        run: |
          curl -X POST "$DEPLOY_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d '{"service":"adaptix-contracts","env":"${{ github.event.inputs.environment }}"}'
