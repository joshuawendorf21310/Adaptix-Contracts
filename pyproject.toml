[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "adaptix-contracts"
version = "1.1.0"
description = "Shared cross-domain schemas and contracts for the Adaptix platform"
readme = "README.md"
license = {file = "LICENSE"}
requires-python = ">=3.11"
keywords = ["adaptix", "contracts", "schemas", "pydantic", "ems", "dispatch", "healthcare"]
classifiers = [
    "Development Status :: 5 - Production/Stable",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Typing :: Typed",
]
dependencies = [
    "pydantic>=2.6.0",
    "fastapi>=0.111.0",
    "httpx>=0.27.0",
    "email-validator>=2.0.0"
]

[project.urls]
Homepage = "https://github.com/joshuawendorf21310/Adaptix-Contracts"
Repository = "https://github.com/joshuawendorf21310/Adaptix-Contracts"
Changelog = "https://github.com/joshuawendorf21310/Adaptix-Contracts/blob/main/CHANGELOG.md"

[project.optional-dependencies]
dev = [
    "pytest==8.3.5",
    "pytest-asyncio==0.24.0",
    "pytest-cov==6.1.1"
]

[tool.setuptools]
package-dir = {"" = "."}

[tool.setuptools.packages.find]
where = ["."]
include = ["adaptix_contracts*"]
exclude = ["tests*", "examples*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q"
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"
