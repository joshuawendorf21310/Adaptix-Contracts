[build-system]
requires = ["setuptools>=61", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "adaptix-contracts"
version = "0.2.1"
description = "Shared Pydantic schemas, event types, domain enums, and event envelope contracts for the Adaptix platform"
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.0",
    "email-validator>=2.0",
]

[tool.setuptools.packages.find]
where = ["."]
include = ["adaptix_contracts*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q --tb=short"

[project.optional-dependencies]
dev = ["pytest>=8.0", "pytest-asyncio>=0.23"]
