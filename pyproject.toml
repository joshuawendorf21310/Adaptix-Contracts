[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "adaptix-contracts"
version = "1.0.0"
description = "Shared cross-domain schemas and contracts for the Adaptix platform"
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.6.0"
]

[tool.setuptools]
package-dir = {"" = "."}

[tool.setuptools.packages.find]
where = ["."]
include = ["adaptix_contracts*"]
exclude = ["tests*", "examples*"]
